services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: campus-link-frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
      WATCHPACK_POLLING: "true"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: campus-link-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      DATABASE_URL: jdbc:postgresql://db:5432/campus_link
      DATABASE_USERNAME: campus_link
      DATABASE_PASSWORD: campus_link
    volumes:
      - ./backend:/app
      - backend_gradle_cache:/home/gradle/.gradle
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: campus-link-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: campus_link
      POSTGRES_USER: campus_link
      POSTGRES_PASSWORD: campus_link
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campus_link -d campus_link"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  frontend_node_modules:
  frontend_next:
  backend_gradle_cache:
  postgres_data:
